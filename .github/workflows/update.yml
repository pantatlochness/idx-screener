name: Update IDX data

# Runs every 15 min during IDX trading hours.
# IDX trades Mon-Fri ~09:00-16:00 WIB (UTC+7) = 02:00-09:00 UTC.
# GitHub cron is best-effort and may be delayed a few minutes.
on:
  schedule:
    - cron: "*/15 2-9 * * 1-5"
  workflow_dispatch: {}   # lets you run it manually from the Actions tab

permissions:
  contents: write          # needed so the job can commit data.json back

concurrency:
  group: update-idx-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch latest prices
        run: python fetch_data.py

      - name: Commit updated data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "data: update $(date -u +%FT%TZ)"
            git push
          fi
