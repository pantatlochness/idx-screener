name: Rebuild liquid universe

# Rebuilds tickers.json weekly so the pool stays current: newly-liquid stocks
# get added, illiquid/delisted ones drop out. Runs Sunday 22:00 UTC
# (Mon 05:00 WIB, before the week opens). Also runnable manually.
on:
  schedule:
    - cron: "0 22 * * 0"
  workflow_dispatch:
    inputs:
      liq_min_idr:
        description: "Min avg daily value traded (IDR) to count as liquid"
        default: "1000000000"
        required: false

permissions:
  contents: write

concurrency:
  group: build-idx-universe
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Rebuild liquid universe
        env:
          LIQ_MIN_IDR: ${{ github.event.inputs.liq_min_idr || '1000000000' }}
        run: python build_tickers.py

      - name: Commit updated tickers.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tickers.json
          if git diff --staged --quiet; then
            echo "Universe unchanged."
          else
            git commit -m "universe: rebuild liquid tickers $(date -u +%F)"
            git push
          fi
